server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  - job_name: agent_logs

    static_configs:
      - targets:
          - localhost
        labels:
          job: agent_framework
          host: local_machine
          __path__: /agent_framework/logs/application.log